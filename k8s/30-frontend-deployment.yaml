apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sistema-despachos
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # El pipeline deploy-frontend.yml sobreescribe este tag con ${{ github.sha }}
          image: 218020533514.dkr.ecr.us-east-1.amazonaws.com/sistema-despachos-frontend:latest
          ports:
            - containerPort: 80
          # No requiere variables de entorno: el proxy Nginx está embebido en la imagen
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
