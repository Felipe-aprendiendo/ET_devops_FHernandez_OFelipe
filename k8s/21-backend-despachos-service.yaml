apiVersion: v1
kind: Service
metadata:
  # IMPORTANTE: "backend-despachos" debe coincidir con el proxy_pass en front_despacho/nginx.conf
  name: backend-despachos
  namespace: sistema-despachos
  labels:
    app: backend-despachos
spec:
  type: ClusterIP
  selector:
    app: backend-despachos
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
