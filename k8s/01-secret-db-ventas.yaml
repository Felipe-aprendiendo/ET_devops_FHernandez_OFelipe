# =============================================================
# ADVERTENCIA DE SEGURIDAD
# Este archivo contiene credenciales PLACEHOLDER. NUNCA lo commitees con valores
# reales. Edita los valores antes de ejecutar kubectl apply y no los commitees.
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials-ventas
  namespace: sistema-despachos
type: Opaque
stringData:
  DB_ENDPOINT: "mysql"
  DB_PORT: "3306"
  DB_NAME: "ventas_db"
  DB_USERNAME: "root"
  # IMPORTANTE: debe coincidir EXACTAMENTE con MYSQL_ROOT_PASSWORD en
  # 03-secret-mysql-root.yaml. Edita ambos valores juntos antes del apply.
  DB_PASSWORD: "REEMPLAZAR_CON_PASSWORD_MYSQL_ROOT"
