apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ventas
  namespace: sistema-despachos
  labels:
    app: backend-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-ventas
  template:
    metadata:
      labels:
        app: backend-ventas
    spec:
      containers:
        - name: backend-ventas
          # El pipeline deploy-backend-ventas.yml sobreescribe este tag con ${{ github.sha }}
          image: 218020533514.dkr.ecr.us-east-1.amazonaws.com/sistema-despachos-ventas:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: db-credentials-ventas
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
