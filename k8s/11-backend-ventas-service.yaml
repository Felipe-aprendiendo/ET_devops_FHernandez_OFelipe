apiVersion: v1
kind: Service
metadata:
  # IMPORTANTE: "backend-ventas" debe coincidir con el proxy_pass en front_despacho/nginx.conf
  name: backend-ventas
  namespace: sistema-despachos
  labels:
    app: backend-ventas
spec:
  type: ClusterIP
  selector:
    app: backend-ventas
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
