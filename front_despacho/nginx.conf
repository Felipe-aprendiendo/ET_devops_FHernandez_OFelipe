server {
    listen 80;
    server_name _;

    # Directorio raíz donde se copiaron los estáticos de React (dist/)
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: cualquier ruta que no sea un archivo físico se redirige
    # a index.html para que React Router maneje el routing del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------
    # Proxy inverso hacia el backend de ventas
    # IMPORTANTE: el hostname "backend-ventas" debe coincidir EXACTAMENTE
    # con el campo metadata.name del Service definido en k8s/11-backend-ventas-service.yaml.
    # Kubernetes resuelve ese nombre internamente dentro del clúster.
    # ---------------------------------------------------------------
    location /api/ventas/ {
        proxy_pass http://backend-ventas:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------------------
    # Proxy inverso hacia el backend de despachos
    # IMPORTANTE: el hostname "backend-despachos" debe coincidir EXACTAMENTE
    # con el campo metadata.name del Service definido en k8s/21-backend-despachos-service.yaml.
    # ---------------------------------------------------------------
    location /api/despachos/ {
        proxy_pass http://backend-despachos:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
