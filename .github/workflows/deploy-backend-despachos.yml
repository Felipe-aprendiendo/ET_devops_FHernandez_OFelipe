# =============================================================
# GitHub Secrets requeridos (se configuran UNA SOLA VEZ en este repositorio):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN
#   (AWS Academy Learner Lab — renovar cada sesión)
#   EKS_CLUSTER_NAME — Nombre del clúster EKS (usado en aws eks update-kubeconfig)
#
# ADVERTENCIA — Prerequisito de infraestructura:
#   El Deployment "backend-despachos" debe existir en el clúster antes del
#   primer push a deploy. Aplicar kubectl apply -f k8s/ al menos una vez primero.
# =============================================================

name: Deploy — Backend Despachos

on:
  push:
    branches:
      - deploy
    paths:
      - "back-Despachos_SpringBoot/**"

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Ejecutar tests
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: mvn -B test

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push de imagen a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sistema-despachos-despachos
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Configurar kubeconfig para EKS
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region us-east-1

      - name: Deploy a EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sistema-despachos-despachos
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/backend-despachos \
            backend-despachos=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --namespace sistema-despachos
          kubectl rollout status deployment/backend-despachos \
            --namespace sistema-despachos \
            --timeout=300s
